name: c- Monitor

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: states
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Run monitor for ~5h50m
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_LIFECYCLE_NOTIFY: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: |
          mkdir -p states
          timeout --signal=SIGTERM --kill-after=30 21000 python3 monitor.py || true

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: states
          key: monitor-state-${{ github.run_id }}
